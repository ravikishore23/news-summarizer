<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewsBrief — AI Summarizer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0f0e0d;
        --paper: #f5f0e8;
        --accent: #c8392b;
        --muted: #7a7570;
        --border: #d4cfc8;
        --card: #ffffff;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--paper);
        color: var(--ink);
        min-height: 100vh;
      }

      /* Header */
      header {
        border-bottom: 2px solid var(--ink);
        padding: 18px 40px;
        display: flex;
        align-items: baseline;
        gap: 16px;
        background: var(--paper);
      }
      .logo {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -1px;
      }
      .logo span {
        color: var(--accent);
      }
      .tagline {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        border-left: 1px solid var(--border);
        padding-left: 16px;
      }

      /* Main */
      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      .input-section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 32px;
        margin-bottom: 32px;
        box-shadow: 4px 4px 0 var(--ink);
      }

      .input-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
        display: block;
      }

      .url-row {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
      }

      input[type="url"] {
        flex: 1;
        padding: 14px 16px;
        border: 1.5px solid var(--border);
        border-radius: 3px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        background: var(--paper);
        color: var(--ink);
        outline: none;
        transition: border-color 0.2s;
      }
      input[type="url"]:focus {
        border-color: var(--ink);
      }
      input[type="url"]::placeholder {
        color: var(--muted);
      }

      .btn-summarize {
        padding: 14px 28px;
        background: var(--ink);
        color: var(--paper);
        border: none;
        border-radius: 3px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        letter-spacing: 0.5px;
        transition:
          background 0.2s,
          transform 0.1s;
        white-space: nowrap;
      }
      .btn-summarize:hover {
        background: var(--accent);
      }
      .btn-summarize:active {
        transform: scale(0.98);
      }
      .btn-summarize:disabled {
        background: var(--muted);
        cursor: not-allowed;
      }

      /* Style pills */
      .style-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .style-pill {
        padding: 7px 16px;
        border: 1.5px solid var(--border);
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        background: transparent;
        font-family: "DM Sans", sans-serif;
        color: var(--ink);
        transition: all 0.15s;
      }
      .style-pill:hover {
        border-color: var(--ink);
      }
      .style-pill.active {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }

      /* Result */
      .result-section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 4px 4px 0 var(--ink);
        display: none;
        animation: slideIn 0.3s ease;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .result-section.visible {
        display: block;
      }

      .result-header {
        padding: 20px 32px;
        border-bottom: 1px solid var(--border);
        background: var(--ink);
        color: var(--paper);
      }
      .result-header h2 {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 6px;
      }
      .result-meta {
        font-size: 12px;
        color: #aaa;
        letter-spacing: 1px;
      }

      .result-body {
        padding: 32px;
      }
      .result-body p {
        font-size: 16px;
        line-height: 1.8;
        color: var(--ink);
        margin-bottom: 12px;
      }
      .result-body ul {
        padding-left: 20px;
      }
      .result-body li {
        font-size: 16px;
        line-height: 1.8;
        margin-bottom: 10px;
        color: var(--ink);
      }
      .result-body li::marker {
        color: var(--accent);
      }

      /* Loading */
      .loading {
        display: none;
        text-align: center;
        padding: 48px;
      }
      .loading.visible {
        display: block;
      }
      .loading-dots span {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: var(--ink);
        border-radius: 50%;
        margin: 0 3px;
        animation: bounce 1.2s infinite;
      }
      .loading-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loading-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
      }
      .loading-text {
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 1px;
      }

      /* Error */
      .error-box {
        display: none;
        background: #fff5f5;
        border: 1px solid #fcc;
        border-left: 4px solid var(--accent);
        border-radius: 3px;
        padding: 16px 20px;
        font-size: 14px;
        color: var(--accent);
        margin-top: 16px;
      }
      .error-box.visible {
        display: block;
      }

      /* Examples */
      .examples {
        margin-bottom: 24px;
      }
      .examples-label {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .example-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .example-link {
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 5px 12px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.15s;
        text-decoration: none;
      }
      .example-link:hover {
        color: var(--ink);
        border-color: var(--ink);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">News<span>Brief</span></div>
      <div class="tagline">AI-powered article summarizer</div>
    </header>

    <main>
      <div class="input-section">
        <label class="input-label">Article URL</label>
        <div class="url-row">
          <input
            type="url"
            id="urlInput"
            placeholder="https://example.com/article..."
          />
          <button class="btn-summarize" id="summarizeBtn" onclick="summarize()">
            Summarize
          </button>
        </div>

        <label class="input-label">Summary style</label>
        <div class="style-row" id="styleRow">
          <button
            class="style-pill active"
            data-style="bullets"
            onclick="setStyle(this)"
          >
            Bullet points
          </button>
          <button
            class="style-pill"
            data-style="short"
            onclick="setStyle(this)"
          >
            Quick summary
          </button>
          <button
            class="style-pill"
            data-style="detailed"
            onclick="setStyle(this)"
          >
            Detailed
          </button>
          <button class="style-pill" data-style="eli5" onclick="setStyle(this)">
            Explain simply
          </button>
        </div>

        <div class="error-box" id="errorBox"></div>
      </div>

      <div class="examples">
        <div class="examples-label">Try an example</div>
        <div class="example-links">
          <span
            class="example-link"
            onclick="
              setUrl('https://www.bbc.com/news')
            "
            >Today News</span
          >
          <span
            class="example-link"
            onclick="
              setUrl('https://www.bbc.com/sport')""
            >Sports News</span
          >
          <span
            class="example-link"
            onclick="
              setUrl('https://www.bbc.com/business')
            "
            >Business News</span
          >
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-text">
          Reading article and generating summary...
        </div>
      </div>

      <div class="result-section" id="resultSection">
        <div class="result-header">
          <h2 id="resultTitle"></h2>
          <div class="result-meta" id="resultMeta"></div>
        </div>
        <div class="result-body" id="resultBody"></div>
      </div>
    </main>

    <script>
      let selectedStyle = "bullets";

      function setStyle(el) {
        document
          .querySelectorAll(".style-pill")
          .forEach((p) => p.classList.remove("active"));
        el.classList.add("active");
        selectedStyle = el.dataset.style;
      }

      function setUrl(url) {
        document.getElementById("urlInput").value = url;
      }

      function formatSummary(text) {
        const lines = text.split("\n").filter((l) => l.trim());
        let html = "";
        let inList = false;

        for (const line of lines) {
          const clean = line.trim();
          if (
            clean.startsWith("•") ||
            clean.startsWith("-") ||
            clean.match(/^\d+\./)
          ) {
            if (!inList) {
              html += "<ul>";
              inList = true;
            }
            html += `<li>${clean.replace(/^[•\-\d\.]\s*/, "")}</li>`;
          } else {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            if (clean) html += `<p>${clean}</p>`;
          }
        }
        if (inList) html += "</ul>";
        return html;
      }

      async function summarize() {
        const url = document.getElementById("urlInput").value.trim();
        const errorBox = document.getElementById("errorBox");
        const loading = document.getElementById("loading");
        const result = document.getElementById("resultSection");
        const btn = document.getElementById("summarizeBtn");

        errorBox.classList.remove("visible");
        result.classList.remove("visible");

        if (!url) {
          errorBox.textContent = "Please enter a URL first.";
          errorBox.classList.add("visible");
          return;
        }

        btn.disabled = true;
        loading.classList.add("visible");

        try {
          const res = await fetch("/summarize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url, style: selectedStyle }),
          });
          const data = await res.json();

          if (data.error) {
            errorBox.textContent = data.error;
            errorBox.classList.add("visible");
          } else {
            document.getElementById("resultTitle").textContent = data.title;
            document.getElementById("resultMeta").textContent =
              `${data.words.toLocaleString()} words read · summarized with local LLM`;
            document.getElementById("resultBody").innerHTML = formatSummary(
              data.summary,
            );
            result.classList.add("visible");
            result.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        } catch (e) {
          errorBox.textContent =
            "Could not connect to server. Make sure Flask is running.";
          errorBox.classList.add("visible");
        } finally {
          btn.disabled = false;
          loading.classList.remove("visible");
        }
      }

      document.getElementById("urlInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") summarize();
      });
    </script>
  </body>
</html>
